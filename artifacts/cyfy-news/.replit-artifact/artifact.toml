kind = "web"
previewPath = "/"
title = "CYFY News Board"
version = "1.0.0"
id = "artifacts/cyfy-news"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21920
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/cyfy-news run dev"

[services.env]
PORT = "21920"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/cyfy-news", "run", "build"]
publicDir = "artifacts/cyfy-news/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
