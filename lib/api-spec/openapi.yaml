openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CYFY News Board API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard stats
  - name: news
    description: News and threat items
  - name: advisories
    description: Security advisories
  - name: threats
    description: Threat intelligence
  - name: search
    description: Global search
  - name: export
    description: Export and email operations
  - name: workspaces
    description: Workspace management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      parameters:
        - name: timeframe
          in: query
          description: Time range filter (1h, 6h, 24h, 7d, 30d, all)
          schema:
            type: string
            enum: [1h, 6h, 24h, 7d, 30d, all]
            default: 24h
        - name: scope
          in: query
          description: Filter stats by scope (local=India only, global=non-India)
          schema:
            type: string
            enum: [local, global]
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /news:
    get:
      operationId: getNews
      tags: [news]
      summary: List news and threat items
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            enum: [local, global]
        - name: severity
          in: query
          description: Comma-separated severities (e.g. critical,high,medium)
          schema:
            type: string
        - name: category
          in: query
          description: Comma-separated categories (e.g. ransomware,phishing)
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [threat, news, advisory]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, resolved, monitoring]
        - name: timeframe
          in: query
          description: Time range shorthand (1h, 6h, 24h, 7d, 30d, all)
          schema:
            type: string
            enum: [1h, 6h, 24h, 7d, 30d, all]
        - name: from
          in: query
          description: Filter news published on or after this date (ISO 8601)
          schema:
            type: string
            format: date
        - name: to
          in: query
          description: Filter news published on or before this date (ISO 8601)
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated news list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsListResponse"
    post:
      operationId: createNews
      tags: [news]
      summary: Create a news item (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNewsItem"
      responses:
        "201":
          description: Created news item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /news/{id}:
    get:
      operationId: getNewsById
      tags: [news]
      summary: Get a news item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: News item detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateNews
      tags: [news]
      summary: Update a news item (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNewsItem"
      responses:
        "200":
          description: Updated news item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteNews
      tags: [news]
      summary: Delete a news item (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /advisories/cert-in:
    get:
      operationId: getCertInAdvisories
      tags: [advisories]
      summary: List CERT-In advisories
      parameters:
        - name: timeframe
          in: query
          schema:
            type: string
            enum: [1h, 6h, 24h, 7d, 30d, 90d, all]
            default: 30d
        - name: severity
          in: query
          description: Comma-separated severities
          schema:
            type: string
        - name: category
          in: query
          description: Filter by certInType (vulnerability, advisory)
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: CERT-In advisories list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertInAdvisoryListResponse"

  /advisories:
    get:
      operationId: getAdvisories
      tags: [advisories]
      summary: List security advisories
      parameters:
        - name: scope
          in: query
          description: Filter by scope (local=India only, global=non-India)
          schema:
            type: string
            enum: [local, global]
        - name: severity
          in: query
          description: Comma-separated severities (e.g. critical,high,medium)
          schema:
            type: string
        - name: vendor
          in: query
          description: Comma-separated vendors (e.g. Microsoft,Cisco)
          schema:
            type: string
        - name: status
          in: query
          description: Comma-separated statuses (e.g. new,under_review)
          schema:
            type: string
        - name: excludeCertIn
          in: query
          description: Exclude CERT-In advisories from results
          schema:
            type: boolean
            default: false
        - name: timeframe
          in: query
          description: Time range shorthand (1h, 6h, 24h, 7d, 30d, all)
          schema:
            type: string
            enum: [1h, 6h, 24h, 7d, 30d, all]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated advisories list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvisoryListResponse"

  /advisories/{id}:
    get:
      operationId: getAdvisoryById
      tags: [advisories]
      summary: Get advisory by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Advisory detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Advisory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /threats:
    get:
      operationId: getThreats
      tags: [threats]
      summary: List threat intelligence items
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            enum: [local, global]
        - name: severity
          in: query
          description: Comma-separated severities (e.g. critical,high,medium)
          schema:
            type: string
        - name: category
          in: query
          description: Comma-separated categories (e.g. ransomware,phishing)
          schema:
            type: string
        - name: state
          in: query
          description: Indian state code filter (e.g. MH, KA)
          schema:
            type: string
        - name: sector
          in: query
          description: Indian sector filter
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, resolved, monitoring]
        - name: timeframe
          in: query
          description: Time range shorthand (1h, 6h, 24h, 7d, 30d, all)
          schema:
            type: string
            enum: [1h, 6h, 24h, 7d, 30d, all]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated threats list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreatIntelListResponse"

  /threats/{id}:
    get:
      operationId: getThreatById
      tags: [threats]
      summary: Get threat by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Threat detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreatIntelItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /threats/export:
    get:
      operationId: exportThreats
      tags: [threats]
      summary: Export threats as CSV
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            enum: [local, global]
        - name: severity
          in: query
          description: Comma-separated severities (e.g. critical,high)
          schema:
            type: string
        - name: category
          in: query
          description: Comma-separated categories
          schema:
            type: string
        - name: state
          in: query
          description: Indian state code filter
          schema:
            type: string
        - name: sector
          in: query
          description: Indian sector filter
          schema:
            type: string
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /export/advisory/{id}:
    get:
      operationId: exportAdvisory
      tags: [export]
      summary: Export a single advisory as HTML
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: HTML advisory document
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /export/advisories/bulk:
    post:
      operationId: exportAdvisoriesBulk
      tags: [export]
      summary: Export multiple advisories as a single HTML report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                timeframe:
                  type: string
                scope:
                  type: string
                  enum: [local, global]
                vendor:
                  type: string
      responses:
        "200":
          description: Bulk HTML advisory report
          content:
            text/html:
              schema:
                type: string

  /export/templates:
    get:
      operationId: getEmailTemplates
      tags: [export]
      summary: Get available email templates
      parameters:
        - name: type
          in: query
          description: Filter by template type (general, cert-in, threat, all)
          schema:
            type: string
      responses:
        "200":
          description: List of email templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailTemplate"

  /export/preview:
    post:
      operationId: previewEmail
      tags: [export]
      summary: Preview an email export
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportPreviewRequest"
      responses:
        "200":
          description: Email preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailPreview"

  /export/email:
    post:
      operationId: exportEmail
      tags: [export]
      summary: Export an advisory/threat as email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportEmailRequest"
      responses:
        "200":
          description: Email export result
          content:
            application/json:
              schema:
                type: object
                properties:
                  subject:
                    type: string
                  body:
                    type: string
                  mailtoLink:
                    type: string

  /export/email/batch:
    post:
      operationId: exportEmailBatch
      tags: [export]
      summary: Batch export advisories as emails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportEmailBatchRequest"
      responses:
        "200":
          description: Batch email export results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchExportResult"

  /search:
    get:
      operationId: search
      tags: [search]
      summary: Search across news, threats, and advisories
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [threat, news, advisory]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchListResponse"

  /news/{id}/bookmark:
    post:
      operationId: toggleBookmark
      tags: [news]
      summary: Toggle bookmark on a news item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bookmark toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookmarkResponse"

  /news/bookmarked:
    get:
      operationId: getBookmarkedNews
      tags: [news]
      summary: Get all bookmarked news items
      responses:
        "200":
          description: Bookmarked items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsListResponse"

  /workspaces:
    get:
      operationId: listWorkspaces
      tags: [workspaces]
      summary: List all workspaces
      responses:
        "200":
          description: List of workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"
    post:
      operationId: createWorkspace
      tags: [workspaces]
      summary: Create a new workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspace"
      responses:
        "201":
          description: Created workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces/{id}:
    get:
      operationId: getWorkspace
      tags: [workspaces]
      summary: Get workspace by ID with products
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateWorkspace
      tags: [workspaces]
      summary: Update a workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspace"
      responses:
        "200":
          description: Updated workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteWorkspace
      tags: [workspaces]
      summary: Delete a workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Cannot delete master workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces/{id}/products:
    post:
      operationId: addProduct
      tags: [workspaces]
      summary: Add a product to workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProduct"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces/{id}/products/{productId}:
    delete:
      operationId: removeProduct
      tags: [workspaces]
      summary: Remove a product from workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /workspaces/{id}/feed:
    get:
      operationId: getWorkspaceFeed
      tags: [workspaces]
      summary: Get threat feed for a workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Workspace threat feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceFeedResponse"

  /workspaces/{id}/match:
    post:
      operationId: matchWorkspaceThreats
      tags: [workspaces]
      summary: Trigger threat matching for workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Matching result
          content:
            application/json:
              schema:
                type: object
                required:
                  - matchedCount
                properties:
                  matchedCount:
                    type: integer

  /workspaces/{id}/matches/{matchId}:
    put:
      operationId: updateMatch
      tags: [workspaces]
      summary: Update a threat match (review/resolve/dismiss)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reviewed:
                  type: boolean
                dismissed:
                  type: boolean
                matchStatus:
                  type: string
                  enum: [active, resolved]
      responses:
        "200":
          description: Updated match
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DashboardStats:
      type: object
      required:
        - totalThreatsToday
        - localThreatsToday
        - globalThreatsToday
        - activeAdvisories
        - criticalAlerts
        - highAlerts
        - resolvedIncidents
        - currentThreatLevel
        - recentActivity
      properties:
        totalThreatsToday:
          type: integer
        localThreatsToday:
          type: integer
        globalThreatsToday:
          type: integer
        activeAdvisories:
          type: integer
        criticalAlerts:
          type: integer
        highAlerts:
          type: integer
        resolvedIncidents:
          type: integer
        currentThreatLevel:
          type: string
          enum: [low, medium, high, critical]
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
        indiaStats:
          type: object
          nullable: true
          description: India-specific stats when scope=local
          properties:
            byState:
              type: array
              items:
                type: object
                properties:
                  state:
                    type: string
                  count:
                    type: integer
            bySector:
              type: array
              items:
                type: object
                properties:
                  sector:
                    type: string
                  count:
                    type: integer

    ActivityItem:
      type: object
      required:
        - id
        - title
        - type
        - severity
        - timestamp
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
        severity:
          type: string
        timestamp:
          type: string
        sourceUrl:
          type: string
          nullable: true
          description: Real article/source URL for opening in new tab
        sourceType:
          type: string
          description: "news or threat - for routing"

    CreateNewsItem:
      type: object
      required:
        - title
        - summary
        - content
        - type
        - scope
        - severity
        - category
        - source
      properties:
        title:
          type: string
        summary:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [threat, news, advisory]
        scope:
          type: string
          enum: [local, global]
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        category:
          type: string
        source:
          type: string
        sourceUrl:
          type: string
          nullable: true
        region:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        iocs:
          type: array
          items:
            type: string
        affectedSystems:
          type: array
          items:
            type: string
        mitigations:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, resolved, monitoring]

    UpdateNewsItem:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [threat, news, advisory]
        scope:
          type: string
          enum: [local, global]
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        category:
          type: string
        source:
          type: string
        sourceUrl:
          type: string
          nullable: true
        region:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        iocs:
          type: array
          items:
            type: string
        affectedSystems:
          type: array
          items:
            type: string
        mitigations:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, resolved, monitoring]

    NewsItem:
      type: object
      required:
        - id
        - title
        - summary
        - content
        - type
