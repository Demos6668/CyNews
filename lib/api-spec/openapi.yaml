openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CYFY News Board API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard stats
  - name: news
    description: News and threat items
  - name: advisories
    description: Security advisories
  - name: search
    description: Global search

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /news:
    get:
      operationId: getNews
      tags: [news]
      summary: List news and threat items
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            enum: [local, global]
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low, info]
        - name: category
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [threat, news, advisory]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, resolved, monitoring]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated news list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsListResponse"

  /news/{id}:
    get:
      operationId: getNewsById
      tags: [news]
      summary: Get a news item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: News item detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /advisories:
    get:
      operationId: getAdvisories
      tags: [advisories]
      summary: List security advisories
      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low, info]
        - name: vendor
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [new, under_review, patched, dismissed]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated advisories list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvisoryListResponse"

  /advisories/{id}:
    get:
      operationId: getAdvisoryById
      tags: [advisories]
      summary: Get advisory by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Advisory detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Advisory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /threats:
    get:
      operationId: getThreats
      tags: [news]
      summary: List threat intelligence items
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            enum: [local, global]
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low, info]
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, resolved, monitoring]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated threats list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsListResponse"

  /threats/{id}:
    get:
      operationId: getThreatById
      tags: [news]
      summary: Get threat by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Threat detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /threats/export:
    get:
      operationId: exportThreats
      tags: [news]
      summary: Export threats as CSV
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            enum: [local, global]
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low, info]
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /search:
    get:
      operationId: search
      tags: [search]
      summary: Search across news, threats, and advisories
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [threat, news, advisory]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchListResponse"

  /news/{id}/bookmark:
    post:
      operationId: toggleBookmark
      tags: [news]
      summary: Toggle bookmark on a news item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bookmark toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookmarkResponse"

  /news/bookmarked:
    get:
      operationId: getBookmarkedNews
      tags: [news]
      summary: Get all bookmarked news items
      responses:
        "200":
          description: Bookmarked items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsListResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DashboardStats:
      type: object
      required:
        - totalThreatsToday
        - localThreatsToday
        - globalThreatsToday
        - activeAdvisories
        - criticalAlerts
        - resolvedIncidents
        - currentThreatLevel
        - recentActivity
      properties:
        totalThreatsToday:
          type: integer
        localThreatsToday:
          type: integer
        globalThreatsToday:
          type: integer
        activeAdvisories:
          type: integer
        criticalAlerts:
          type: integer
        resolvedIncidents:
          type: integer
        currentThreatLevel:
          type: string
          enum: [low, medium, high, critical]
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"

    ActivityItem:
      type: object
      required:
        - id
        - title
        - type
        - severity
        - timestamp
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
        severity:
          type: string
        timestamp:
          type: string

    NewsItem:
      type: object
      required:
        - id
        - title
        - summary
        - content
        - type
        - scope
        - severity
        - category
        - source
        - region
        - tags
        - status
        - publishedAt
        - updatedAt
        - bookmarked
      properties:
        id:
          type: integer
        title:
          type: string
        summary:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [threat, news, advisory]
        scope:
          type: string
          enum: [local, global]
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        category:
          type: string
        source:
          type: string
        sourceUrl:
          type: string
          nullable: true
        region:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        iocs:
          type: array
          items:
            type: string
        affectedSystems:
          type: array
          items:
            type: string
        mitigations:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, resolved, monitoring]
        publishedAt:
          type: string
        updatedAt:
          type: string
        bookmarked:
          type: boolean

    NewsListResponse:
      type: object
      required:
        - items
        - total
        - page
        - limit
        - totalPages
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/NewsItem"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    Advisory:
      type: object
      required:
        - id
        - cveId
        - title
        - description
        - cvssScore
        - severity
        - affectedProducts
        - vendor
        - patchAvailable
        - workarounds
        - references
        - status
        - publishedAt
      properties:
        id:
          type: integer
        cveId:
          type: string
        title:
          type: string
        description:
          type: string
        cvssScore:
          type: number
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        affectedProducts:
          type: array
          items:
            type: string
        vendor:
          type: string
        patchAvailable:
          type: boolean
        patchUrl:
          type: string
          nullable: true
        workarounds:
          type: array
          items:
            type: string
        references:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [new, under_review, patched, dismissed]
        publishedAt:
          type: string

    AdvisoryListResponse:
      type: object
      required:
        - items
        - total
        - page
        - limit
        - totalPages
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Advisory"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    SearchListResponse:
      type: object
      required:
        - results
        - total
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        total:
          type: integer

    SearchResult:
      type: object
      required:
        - id
        - title
        - summary
        - type
        - severity
        - source
        - publishedAt
      properties:
        id:
          type: integer
        title:
          type: string
        summary:
          type: string
        type:
          type: string
        severity:
          type: string
        source:
          type: string
        publishedAt:
          type: string

    BookmarkResponse:
      type: object
      required:
        - id
        - bookmarked
      properties:
        id:
          type: integer
        bookmarked:
          type: boolean

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
