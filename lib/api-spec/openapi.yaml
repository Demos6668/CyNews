openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CYFY News Board API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard stats
  - name: news
    description: News and threat items
  - name: advisories
    description: Security advisories
  - name: threats
    description: Threat intelligence
  - name: search
    description: Global search

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      parameters:
        - name: timeframe
          in: query
          description: Time range filter (1h, 6h, 24h, 7d, 30d, all)
          schema:
            type: string
            enum: [1h, 6h, 24h, 7d, 30d, all]
            default: 24h
        - name: scope
          in: query
          description: Filter stats by scope (local=India only, global=non-India)
          schema:
            type: string
            enum: [local, global]
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /news:
    get:
      operationId: getNews
      tags: [news]
      summary: List news and threat items
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            enum: [local, global]
        - name: severity
          in: query
          description: Comma-separated severities (e.g. critical,high,medium)
          schema:
            type: string
        - name: category
          in: query
          description: Comma-separated categories (e.g. ransomware,phishing)
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [threat, news, advisory]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, resolved, monitoring]
        - name: timeframe
          in: query
          description: Time range shorthand (1h, 6h, 24h, 7d, 30d, all)
          schema:
            type: string
            enum: [1h, 6h, 24h, 7d, 30d, all]
        - name: from
          in: query
          description: Filter news published on or after this date (ISO 8601)
          schema:
            type: string
            format: date
        - name: to
          in: query
          description: Filter news published on or before this date (ISO 8601)
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated news list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsListResponse"
    post:
      operationId: createNews
      tags: [news]
      summary: Create a news item (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNewsItem"
      responses:
        "201":
          description: Created news item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /news/{id}:
    get:
      operationId: getNewsById
      tags: [news]
      summary: Get a news item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: News item detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateNews
      tags: [news]
      summary: Update a news item (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNewsItem"
      responses:
        "200":
          description: Updated news item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteNews
      tags: [news]
      summary: Delete a news item (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /advisories:
    get:
      operationId: getAdvisories
      tags: [advisories]
      summary: List security advisories
      parameters:
        - name: scope
          in: query
          description: Filter by scope (local=India only, global=non-India)
          schema:
            type: string
            enum: [local, global]
        - name: severity
          in: query
          description: Comma-separated severities (e.g. critical,high,medium)
          schema:
            type: string
        - name: vendor
          in: query
          description: Comma-separated vendors (e.g. Microsoft,Cisco)
          schema:
            type: string
        - name: status
          in: query
          description: Comma-separated statuses (e.g. new,under_review)
          schema:
            type: string
        - name: timeframe
          in: query
          description: Time range shorthand (1h, 6h, 24h, 7d, 30d, all)
          schema:
            type: string
            enum: [1h, 6h, 24h, 7d, 30d, all]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated advisories list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvisoryListResponse"

  /advisories/{id}:
    get:
      operationId: getAdvisoryById
      tags: [advisories]
      summary: Get advisory by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Advisory detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Advisory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /threats:
    get:
      operationId: getThreats
      tags: [threats]
      summary: List threat intelligence items
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            enum: [local, global]
        - name: severity
          in: query
          description: Comma-separated severities (e.g. critical,high,medium)
          schema:
            type: string
        - name: category
          in: query
          description: Comma-separated categories (e.g. ransomware,phishing)
          schema:
            type: string
        - name: state
          in: query
          description: Indian state code filter (e.g. MH, KA)
          schema:
            type: string
        - name: sector
          in: query
          description: Indian sector filter
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, resolved, monitoring]
        - name: timeframe
          in: query
          description: Time range shorthand (1h, 6h, 24h, 7d, 30d, all)
          schema:
            type: string
            enum: [1h, 6h, 24h, 7d, 30d, all]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated threats list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreatIntelListResponse"

  /threats/{id}:
    get:
      operationId: getThreatById
      tags: [threats]
      summary: Get threat by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Threat detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreatIntelItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /threats/export:
    get:
      operationId: exportThreats
      tags: [threats]
      summary: Export threats as CSV
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            enum: [local, global]
        - name: severity
          in: query
          description: Comma-separated severities (e.g. critical,high)
          schema:
            type: string
        - name: category
          in: query
          description: Comma-separated categories
          schema:
            type: string
        - name: state
          in: query
          description: Indian state code filter
          schema:
            type: string
        - name: sector
          in: query
          description: Indian sector filter
          schema:
            type: string
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /search:
    get:
      operationId: search
      tags: [search]
      summary: Search across news, threats, and advisories
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [threat, news, advisory]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchListResponse"

  /news/{id}/bookmark:
    post:
      operationId: toggleBookmark
      tags: [news]
      summary: Toggle bookmark on a news item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bookmark toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookmarkResponse"

  /news/bookmarked:
    get:
      operationId: getBookmarkedNews
      tags: [news]
      summary: Get all bookmarked news items
      responses:
        "200":
          description: Bookmarked items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsListResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DashboardStats:
      type: object
      required:
        - totalThreatsToday
        - localThreatsToday
        - globalThreatsToday
        - activeAdvisories
        - criticalAlerts
        - resolvedIncidents
        - currentThreatLevel
        - recentActivity
      properties:
        totalThreatsToday:
          type: integer
        localThreatsToday:
          type: integer
        globalThreatsToday:
          type: integer
        activeAdvisories:
          type: integer
        criticalAlerts:
          type: integer
        resolvedIncidents:
          type: integer
        currentThreatLevel:
          type: string
          enum: [low, medium, high, critical]
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
        indiaStats:
          type: object
          nullable: true
          description: India-specific stats when scope=local
          properties:
            byState:
              type: array
              items:
                type: object
                properties:
                  state:
                    type: string
                  count:
                    type: integer
            bySector:
              type: array
              items:
                type: object
                properties:
                  sector:
                    type: string
                  count:
                    type: integer

    ActivityItem:
      type: object
      required:
        - id
        - title
        - type
        - severity
        - timestamp
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
        severity:
          type: string
        timestamp:
          type: string
        sourceUrl:
          type: string
          nullable: true
          description: Real article/source URL for opening in new tab
        sourceType:
          type: string
          description: "news or threat - for routing"

    CreateNewsItem:
      type: object
      required:
        - title
        - summary
        - content
        - type
        - scope
        - severity
        - category
        - source
      properties:
        title:
          type: string
        summary:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [threat, news, advisory]
        scope:
          type: string
          enum: [local, global]
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        category:
          type: string
        source:
          type: string
        sourceUrl:
          type: string
          nullable: true
        region:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        iocs:
          type: array
          items:
            type: string
        affectedSystems:
          type: array
          items:
            type: string
        mitigations:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, resolved, monitoring]

    UpdateNewsItem:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [threat, news, advisory]
        scope:
          type: string
          enum: [local, global]
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        category:
          type: string
        source:
          type: string
        sourceUrl:
          type: string
          nullable: true
        region:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        iocs:
          type: array
          items:
            type: string
        affectedSystems:
          type: array
          items:
            type: string
        mitigations:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, resolved, monitoring]

    NewsItem:
      type: object
      required:
        - id
        - title
        - summary
        - content
        - type
        - scope
        - severity
        - category
        - source
        - region
        - tags
        - status
        - publishedAt
        - updatedAt
        - bookmarked
      properties:
        id:
          type: integer
        title:
          type: string
        summary:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [threat, news, advisory]
        scope:
          type: string
          enum: [local, global]
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        category:
          type: string
        source:
          type: string
        sourceUrl:
          type: string
          nullable: true
        region:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        iocs:
          type: array
          items:
            type: string
        affectedSystems:
          type: array
          items:
            type: string
        mitigations:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, resolved, monitoring]
        publishedAt:
          type: string
        updatedAt:
          type: string
        bookmarked:
          type: boolean
        isIndiaRelated:
          type: boolean
          nullable: true
        indiaConfidence:
          type: integer
          nullable: true
        indianState:
          type: string
          nullable: true
        indianStateName:
          type: string
          nullable: true
        indianCity:
          type: string
          nullable: true
        indianSector:
          type: string
          nullable: true

    NewsListResponse:
      type: object
      required:
        - items
        - total
        - page
        - limit
        - totalPages
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/NewsItem"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    Advisory:
      type: object
      required:
        - id
        - cveId
        - title
        - description
        - cvssScore
        - severity
        - affectedProducts
        - vendor
        - patchAvailable
        - workarounds
        - references
        - status
        - publishedAt
      properties:
        id:
          type: integer
        cveId:
          type: string
        title:
          type: string
        description:
          type: string
        cvssScore:
          type: number
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        affectedProducts:
          type: array
          items:
            type: string
        vendor:
          type: string
        patchAvailable:
          type: boolean
        patchUrl:
          type: string
          nullable: true
        workarounds:
          type: array
          items:
            type: string
        references:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [new, under_review, patched, dismissed]
        publishedAt:
          type: string
        scope:
          type: string
          enum: [local, global]
          description: India (local) or global
        isIndiaRelated:
          type: boolean
        indiaConfidence:
          type: integer

    AdvisoryListResponse:
      type: object
      required:
        - items
        - total
        - page
        - limit
        - totalPages
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Advisory"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    SearchListResponse:
      type: object
      required:
        - results
        - total
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        total:
          type: integer

    SearchResult:
      type: object
      required:
        - id
        - title
        - summary
        - type
        - severity
        - source
        - publishedAt
      properties:
        id:
          type: integer
        title:
          type: string
        summary:
          type: string
        type:
          type: string
        severity:
          type: string
        source:
          type: string
        publishedAt:
          type: string

    BookmarkResponse:
      type: object
      required:
        - id
        - bookmarked
      properties:
        id:
          type: integer
        bookmarked:
          type: boolean

    ThreatIntelItem:
      type: object
      required:
        - id
        - title
        - summary
        - description
        - scope
        - severity
        - category
        - source
        - ttps
        - iocs
        - malwareFamilies
        - affectedSystems
        - mitigations
        - targetSectors
        - targetRegions
        - status
        - confidenceLevel
        - publishedAt
        - updatedAt
      properties:
        id:
          type: integer
        title:
          type: string
        summary:
          type: string
        description:
          type: string
        scope:
          type: string
          enum: [local, global]
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        category:
          type: string
        threatActor:
          type: string
          nullable: true
        threatActorAliases:
          type: array
          items:
            type: string
        targetSectors:
          type: array
          items:
            type: string
        targetRegions:
          type: array
          items:
            type: string
        ttps:
          type: array
          items:
            type: string
        iocs:
          type: array
          items:
            type: string
        malwareFamilies:
          type: array
          items:
            type: string
        affectedSystems:
          type: array
          items:
            type: string
        mitigations:
          type: array
          items:
            type: string
        source:
          type: string
        sourceUrl:
          type: string
          nullable: true
        references:
          type: array
          items:
            type: string
        campaignName:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, resolved, monitoring]
        confidenceLevel:
          type: string
          enum: [confirmed, high, medium, low]
        firstSeen:
          type: string
          nullable: true
        lastSeen:
          type: string
          nullable: true
        publishedAt:
          type: string
        updatedAt:
          type: string
        isIndiaRelated:
          type: boolean
          nullable: true
        indiaConfidence:
          type: integer
          nullable: true
        indianState:
          type: string
          nullable: true
        indianStateName:
          type: string
          nullable: true
        indianCity:
          type: string
          nullable: true
        indianSector:
          type: string
          nullable: true

    ThreatIntelListResponse:
      type: object
      required:
        - items
        - total
        - page
        - limit
        - totalPages
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ThreatIntelItem"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
